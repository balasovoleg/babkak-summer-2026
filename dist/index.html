    <title>Babkak Summer 2026</title>
    <script type="module" crossorigin src="/assets/index-DNQAygM6.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/react-vendor-CRgBvUvx.js">
    <link rel="stylesheet" crossorigin href="/assets/index-B4nYpgIi.css">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      // Очистка старого кэша при загрузке
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            if (name.includes('babkak') && !name.includes('v3')) {
              caches.delete(name);
              console.log('🗑️ Deleted old cache:', name);
            }
          }
        });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Сначала удаляем старые Service Workers
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister().then(() => {
                console.log('🗑️ Unregistered old Service Worker');
              });
            }
          }).then(() => {
            // Затем регистрируем новый
            navigator.serviceWorker
              .register('/sw.js')
              .then((registration) => {
                console.log('✅ PWA: Service Worker registered successfully:', registration.scope);
                
                // Проверяем обновления каждый час
                setInterval(() => {
                  registration.update();
                }, 3600000);
              })
              .catch((error) => {
                console.log('❌ PWA: Service Worker registration failed:', error);
              });
          });
        });
      }
    </script>
  </body>
</html>
